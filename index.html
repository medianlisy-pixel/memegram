<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MemeGram 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --card: #181818;
      --border: #2a2a2a;
      --accent: #ff3c5a;
      --accent2: #ff9a00;
      --text: #f0f0f0;
      --muted: #777;
      --grad: linear-gradient(135deg, #ff3c5a 0%, #ff9a00 60%, #ffde59 100%);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
    }
    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 1.55rem;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }
    .nav-count {
      font-size: 0.78rem; color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }
    .upload-btn {
      background: var(--grad);
      border: none; border-radius: 22px;
      padding: 8px 18px;
      color: #000; font-weight: 700;
      font-size: 0.82rem; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }
    .upload-btn:hover { opacity: 0.82; transform: scale(1.04); }

    /* ── MODAL ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(10px);
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 24px;
      width: 100%; max-width: 460px;
      animation: popIn .28s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.82) translateY(20px); }
      to   { opacity:1; transform:scale(1)  translateY(0); }
    }

    .modal-title {
      font-size: 1.1rem; font-weight: 600;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
      min-height: 160px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(255,60,90,.05); }
    .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .drop-zone .dz-icon { font-size: 2.6rem; }
    .drop-zone p { color: var(--muted); font-size: .88rem; }
    .drop-zone .dz-hint { font-size: .75rem; color: #555; }
    #preview-img {
      display: none; width: 100%; max-height: 180px;
      object-fit: contain; border-radius: 10px; margin-top: 10px;
    }

    .field { margin-top: 14px; }
    .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 5px; letter-spacing: .03em; }
    .field input, .field textarea {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 68px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn-cancel {
      flex: 1; padding: 11px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      transition: background .18s;
    }
    .btn-cancel:hover { background: var(--border); }
    .btn-post {
      flex: 2; padding: 11px; border-radius: 10px;
      background: var(--grad); border: none; color: #000;
      font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      transition: opacity .18s;
    }
    .btn-post:hover { opacity: .84; }
    .btn-post:disabled { opacity: .4; cursor: not-allowed; }

    /* ── FEED ── */
    .feed {
      max-width: 500px; margin: 28px auto;
      padding: 0 14px;
      display: flex; flex-direction: column; gap: 22px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      animation: fadeUp .38s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-head {
      padding: 13px 15px;
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .92rem; color: #000;
      flex-shrink: 0; user-select: none;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-user { font-weight: 600; font-size: .9rem; }
    .card-time { font-size: .72rem; color: var(--muted); }

    .menu-wrap { position: relative; }
    .menu-trigger {
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; padding: 4px 8px;
      border-radius: 8px; transition: background .15s;
      line-height: 1;
    }
    .menu-trigger:hover { background: var(--border); }
    .dropdown {
      display: none; position: absolute; right: 0; top: 34px;
      background: #202020; border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; min-width: 120px;
      box-shadow: 0 8px 30px rgba(0,0,0,.5); z-index: 10;
    }
    .dropdown.open { display: block; }
    .dropdown button {
      display: block; width: 100%; padding: 10px 16px;
      background: none; border: none; color: #ff5555;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: .84rem; text-align: left; transition: background .15s;
    }
    .dropdown button:hover { background: rgba(255,85,85,.1); }

    .card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #000; }

    .card-actions { padding: 11px 15px; display: flex; align-items: center; gap: 4px; }
    .like-btn {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: .88rem; padding: 5px 8px; border-radius: 8px;
      transition: background .15s, transform .15s;
    }
    .like-btn:hover { background: rgba(255,60,90,.1); transform: scale(1.08); }
    .like-btn .heart { font-size: 1.25rem; display: inline-block; transition: transform .2s; }
    .like-btn.liked .heart { animation: heartPop .25s ease; }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .like-count { font-weight: 600; min-width: 14px; }

    .card-caption {
      padding: 0 15px 15px;
      font-size: .88rem; line-height: 1.55; color: #ccc;
    }
    .card-caption strong { color: var(--text); margin-right: 6px; font-weight: 600; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .empty .big { font-size: 4rem; margin-bottom: 14px; }
    .empty h3 { font-size: 1.15rem; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: .88rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #222; border: 1px solid var(--border);
      border-radius: 30px; padding: 10px 22px;
      font-size: .85rem; color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; z-index: 300; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">MemeGram</div>
  <span class="nav-count" id="meme-count">0 memes</span>
  <button class="upload-btn" onclick="openModal()">+ Post Meme</button>
</nav>

<!-- UPLOAD MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">🔥 Drop a Meme</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])"/>
      <div class="dz-icon" id="dz-icon">📸</div>
      <p id="dz-text">Click or drag an image here</p>
      <span class="dz-hint" id="dz-hint">JPG, PNG, GIF, WebP · max 8MB</span>
      <img id="preview-img" alt="preview"/>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="input-user" placeholder="your_name" maxlength="30"/>
    </div>
    <div class="field">
      <label>Caption</label>
      <textarea id="input-caption" placeholder="Add a funny caption... 😂" maxlength="300"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-post" id="post-btn" onclick="postMeme()">Post Meme 🚀</button>
    </div>
  </div>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── DATA ──
  const STORAGE_KEY = 'memegram_v2';
  let memes = [];
  let selectedFile = null;
  let selectedDataURL = null;

  function loadMemes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      memes = raw ? JSON.parse(raw) : [];
    } catch { memes = []; }
  }

  function saveMemes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(memes));
  }

  // ── RENDER ──
  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    return d + 'd ago';
  }

  function render() {
    const feed = document.getElementById('feed');
    document.getElementById('meme-count').textContent = memes.length + (memes.length === 1 ? ' meme' : ' memes');

    if (memes.length === 0) {
      feed.innerHTML = `
        <div class="empty">
          <div class="big">😂</div>
          <h3>No memes yet!</h3>
          <p>Be the first to post something hilarious.</p>
        </div>`;
      return;
    }

    const sorted = [...memes].reverse();
    feed.innerHTML = sorted.map((m, i) => `
      <div class="card" style="animation-delay:${i * 0.06}s" id="card-${m.id}">
        <div class="card-head">
          <div class="avatar">${m.username.charAt(0).toUpperCase()}</div>
          <div class="card-info">
            <div class="card-user">${escHtml(m.username)}</div>
            <div class="card-time">${timeAgo(m.timestamp)}</div>
          </div>
          <div class="menu-wrap">
            <button class="menu-trigger" onclick="toggleMenu('${m.id}')">⋯</button>
            <div class="dropdown" id="menu-${m.id}">
              <button onclick="deleteMeme('${m.id}')">🗑 Delete</button>
            </div>
          </div>
        </div>
        <img class="card-img" src="${m.dataURL}" alt="meme"/>
        <div class="card-actions">
          <button class="like-btn ${m.liked ? 'liked' : ''}" id="like-${m.id}" onclick="toggleLike('${m.id}')">
            <span class="heart">${m.liked ? '❤️' : '🤍'}</span>
            <span class="like-count" id="lc-${m.id}">${m.likes}</span>
          </button>
        </div>
        ${m.caption ? `<div class="card-caption"><strong>${escHtml(m.username)}</strong>${escHtml(m.caption)}</div>` : ''}
      </div>
    `).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── ACTIONS ──
  function toggleLike(id) {
    const meme = memes.find(m => m.id === id);
    if (!meme) return;
    meme.liked = !meme.liked;
    meme.likes += meme.liked ? 1 : -1;
    saveMemes();
    // update in place
    document.getElementById('lc-' + id).textContent = meme.likes;
    const btn = document.getElementById('like-' + id);
    btn.querySelector('.heart').textContent = meme.liked ? '❤️' : '🤍';
    if (meme.liked) { btn.classList.add('liked'); } else { btn.classList.remove('liked'); }
  }

  function deleteMeme(id) {
    memes = memes.filter(m => m.id !== id);
    saveMemes();
    const card = document.getElementById('card-' + id);
    if (card) { card.style.opacity = '0'; card.style.transform = 'scale(.9)'; card.style.transition = '.25s'; }
    setTimeout(render, 260);
    showToast('Meme deleted');
  }

  function toggleMenu(id) {
    const menu = document.getElementById('menu-' + id);
    const wasOpen = menu.classList.contains('open');
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    if (!wasOpen) menu.classList.add('open');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.menu-wrap')) {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    }
  });

  // ── UPLOAD MODAL ──
  function openModal() {
    document.getElementById('overlay').classList.add('open');
    resetModal();
  }
  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }
  function resetModal() {
    selectedFile = null; selectedDataURL = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('input-user').value = '';
    document.getElementById('input-caption').value = '';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('dz-icon').style.display = '';
    document.getElementById('dz-text').style.display = '';
    document.getElementById('dz-hint').style.display = '';
    document.getElementById('post-btn').disabled = true;
  }

  function handleFile(file) {
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) { showToast('⚠️ Image too large (max 8MB)'); return; }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      selectedDataURL = e.target.result;
      const img = document.getElementById('preview-img');
      img.src = selectedDataURL;
      img.style.display = 'block';
      document.getElementById('dz-icon').style.display = 'none';
      document.getElementById('dz-text').style.display = 'none';
      document.getElementById('dz-hint').style.display = 'none';
      document.getElementById('post-btn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  // Drag & drop
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  function postMeme() {
    if (!selectedDataURL) return;
    const username = (document.getElementById('input-user').value.trim() || 'Anonymous');
    const caption  = document.getElementById('input-caption').value.trim();
    memes.push({
      id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2),
      username, caption,
      dataURL: selectedDataURL,
      likes: 0, liked: false,
      timestamp: new Date().toISOString()
    });
    saveMemes();
    closeModal();
    render();
    showToast('🔥 Meme posted!');
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ── INIT ──
  loadMemes();
  render();
  document.getElementById('post-btn').disabled = true;
</script>
</body>
</html>
