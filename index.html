<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MemeGram 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --card: #181818;
      --border: #2a2a2a;
      --accent: #ff3c5a;
      --accent2: #ff9a00;
      --text: #f0f0f0;
      --muted: #777;
      --grad: linear-gradient(135deg, #ff3c5a 0%, #ff9a00 60%, #ffde59 100%);
    }

    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.88); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 58px; display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
    }
    .logo {
      font-family: 'Pacifico', cursive; font-size: 1.55rem; flex: 1;
      background: var(--grad); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }
    .nav-count {
      font-size: .78rem; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }
    .upload-btn {
      background: var(--grad); border: none; border-radius: 22px;
      padding: 8px 18px; color: #000; font-weight: 700;
      font-size: .82rem; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: opacity .2s, transform .15s; white-space: nowrap;
    }
    .upload-btn:hover { opacity: .82; transform: scale(1.04); }

    /* UPLOAD MODAL */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 22px; padding: 28px 24px;
      width: 100%; max-width: 460px;
      animation: popIn .28s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.82) translateY(20px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: 14px;
      padding: 32px 16px; text-align: center; cursor: pointer;
      position: relative; transition: border-color .2s, background .2s;
      min-height: 160px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(255,60,90,.05); }
    .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .dz-icon { font-size: 2.6rem; }
    .drop-zone p { color: var(--muted); font-size: .88rem; }
    .dz-hint { font-size: .75rem; color: #555; }
    #preview-img { display:none; width:100%; max-height:180px; object-fit:contain; border-radius:10px; margin-top:10px; }

    .field { margin-top: 14px; }
    .field label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:5px; }
    .field input, .field textarea {
      width:100%; background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:10px 13px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:.9rem;
      outline:none; transition:border-color .2s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize:vertical; min-height:68px; }

    .uploading-bar {
      display:none; align-items:center; justify-content:center;
      gap:10px; padding:12px; color:var(--muted); font-size:.88rem;
    }
    .uploading-bar.show { display:flex; }
    .spinner {
      width:18px; height:18px; border:2px solid var(--border);
      border-top-color:var(--accent); border-radius:50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .modal-actions { display:flex; gap:10px; margin-top:18px; }
    .btn-cancel {
      flex:1; padding:11px; border-radius:10px;
      border:1px solid var(--border); background:transparent;
      color:var(--text); cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:.88rem; transition:background .18s;
    }
    .btn-cancel:hover { background:var(--border); }
    .btn-post {
      flex:2; padding:11px; border-radius:10px;
      background:var(--grad); border:none; color:#000;
      font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:.88rem; transition:opacity .18s;
    }
    .btn-post:hover { opacity:.84; }
    .btn-post:disabled { opacity:.4; cursor:not-allowed; }

    /* COMMENTS PANEL */
    .comments-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
      align-items: flex-end; justify-content: center; padding: 0;
    }
    .comments-overlay.open { display: flex; }

    .comments-panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 22px 22px 0 0;
      width: 100%; max-width: 500px;
      height: 70vh; display: flex; flex-direction: column;
      animation: slideUp .3s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .comments-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .comments-header h3 { font-size: .95rem; font-weight: 600; }
    .comments-close {
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1;
      padding: 4px; border-radius: 8px; transition: background .15s;
    }
    .comments-close:hover { background: var(--border); }

    .comments-list {
      flex: 1; overflow-y: auto; padding: 14px 18px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .comments-list::-webkit-scrollbar { width: 4px; }
    .comments-list::-webkit-scrollbar-track { background: transparent; }
    .comments-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .comment-item {
      display: flex; gap: 10px; align-items: flex-start;
      animation: fadeUp .25s ease;
    }
    .comment-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .75rem; color: #000;
      flex-shrink: 0;
    }
    .comment-body { flex: 1; min-width: 0; }
    .comment-user { font-weight: 600; font-size: .82rem; margin-bottom: 2px; }
    .comment-text { font-size: .88rem; color: #ccc; line-height: 1.45; word-break: break-word; }
    .comment-time { font-size: .7rem; color: var(--muted); margin-top: 3px; }
    .comment-delete {
      background: none; border: none; color: #555;
      cursor: pointer; font-size: .75rem; padding: 2px 6px;
      border-radius: 6px; transition: color .15s, background .15s;
      flex-shrink: 0; margin-top: 2px;
    }
    .comment-delete:hover { color: #ff5555; background: rgba(255,85,85,.1); }

    .no-comments { text-align: center; padding: 40px 20px; color: var(--muted); }
    .no-comments .nc-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .no-comments p { font-size: .88rem; }

    .comments-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
      background: var(--card);
    }
    .comment-user-input {
      width: 90px; flex-shrink: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .82rem;
      outline: none; transition: border-color .2s;
    }
    .comment-user-input:focus { border-color: var(--accent); }
    .comment-text-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 12px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      outline: none; transition: border-color .2s; resize: none;
      min-height: 38px; max-height: 100px; overflow-y: auto;
      line-height: 1.4;
    }
    .comment-text-input:focus { border-color: var(--accent); }
    .comment-send {
      background: var(--grad); border: none; border-radius: 10px;
      width: 38px; height: 38px; cursor: pointer; flex-shrink: 0;
      font-size: 1rem; transition: opacity .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .comment-send:hover { opacity: .82; transform: scale(1.06); }
    .comment-send:disabled { opacity: .3; cursor: not-allowed; }

    /* FEED */
    .feed { max-width: 500px; margin: 28px auto; padding: 0 14px; display: flex; flex-direction: column; gap: 22px; }

    /* CARD */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 18px; overflow: hidden;
      animation: fadeUp .38s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .card-head { padding:13px 15px; display:flex; align-items:center; gap:10px; }
    .avatar {
      width:38px; height:38px; border-radius:50%;
      background:var(--grad);
      display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:.92rem; color:#000; flex-shrink:0;
    }
    .card-info { flex:1; min-width:0; }
    .card-user { font-weight:600; font-size:.9rem; }
    .card-time { font-size:.72rem; color:var(--muted); }

    .menu-wrap { position:relative; }
    .menu-trigger {
      background:none; border:none; color:var(--muted);
      font-size:1.3rem; cursor:pointer; padding:4px 8px;
      border-radius:8px; transition:background .15s; line-height:1;
    }
    .menu-trigger:hover { background:var(--border); }
    .dropdown {
      display:none; position:absolute; right:0; top:34px;
      background:#202020; border:1px solid var(--border);
      border-radius:12px; overflow:hidden; min-width:120px;
      box-shadow:0 8px 30px rgba(0,0,0,.5); z-index:10;
    }
    .dropdown.open { display:block; }
    .dropdown button {
      display:block; width:100%; padding:10px 16px;
      background:none; border:none; color:#ff5555;
      cursor:pointer; font-family:'DM Sans',sans-serif;
      font-size:.84rem; text-align:left; transition:background .15s;
    }
    .dropdown button:hover { background:rgba(255,85,85,.1); }

    .card-img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#000; }

    .card-actions {
      padding: 10px 15px 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .like-btn, .comment-btn {
      background:none; border:none; cursor:pointer;
      display:flex; align-items:center; gap:6px;
      color:var(--text); font-family:'DM Sans',sans-serif;
      font-size:.88rem; padding:5px 8px; border-radius:8px;
      transition:background .15s, transform .15s;
    }
    .like-btn:hover { background:rgba(255,60,90,.1); transform:scale(1.08); }
    .comment-btn:hover { background:rgba(255,154,0,.1); transform:scale(1.08); }
    .like-btn .heart { font-size:1.25rem; }
    .like-btn.liked .heart { animation: heartPop .25s ease; }
    @keyframes heartPop { 0%{transform:scale(1)} 50%{transform:scale(1.35)} 100%{transform:scale(1)} }
    .like-count, .comment-count { font-weight:600; min-width:14px; }
    .comment-btn .bubble { font-size: 1.2rem; }

    .card-caption { padding:0 15px 6px; font-size:.88rem; line-height:1.55; color:#ccc; }
    .card-caption strong { color:var(--text); margin-right:6px; font-weight:600; }

    /* PREVIEW COMMENTS BELOW CARD */
    .card-comments-preview {
      padding: 0 15px 14px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .preview-comment { font-size: .85rem; color: #bbb; line-height: 1.4; }
    .preview-comment strong { color: var(--text); font-weight: 600; margin-right: 5px; }
    .view-all-comments {
      background: none; border: none; color: var(--muted);
      font-size: .8rem; cursor: pointer; padding: 0;
      font-family: 'DM Sans', sans-serif; text-align: left;
      transition: color .15s; margin-top: 2px;
    }
    .view-all-comments:hover { color: var(--text); }

    /* SKELETON */
    .skeleton-card { background:var(--card); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
    .skel { background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; }
    @keyframes shimmer { to{background-position:-200% 0;} }
    .skel-head { height:64px; margin:13px 15px; border-radius:10px; }
    .skel-img { width:100%; aspect-ratio:1/1; }
    .skel-foot { height:40px; margin:11px 15px; border-radius:10px; }

    /* EMPTY */
    .empty { text-align:center; padding:80px 20px; color:var(--muted); }
    .empty .big { font-size:4rem; margin-bottom:14px; }
    .empty h3 { font-size:1.15rem; color:var(--text); margin-bottom:8px; }

    /* TOAST */
    .toast {
      position:fixed; bottom:24px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:#222; border:1px solid var(--border);
      border-radius:30px; padding:10px 22px;
      font-size:.85rem; color:var(--text);
      box-shadow:0 8px 30px rgba(0,0,0,.4);
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
      opacity:0; pointer-events:none; z-index:300; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>

<nav>
  <div class="logo">MemeGram</div>
  <span class="nav-count" id="meme-count">...</span>
  <button class="upload-btn" onclick="openModal()">+ Post Meme</button>
</nav>

<!-- UPLOAD MODAL -->
<div class="overlay" id="upload-overlay" onclick="handleUploadOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">🔥 Drop a Meme</div>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])"/>
      <div class="dz-icon" id="dz-icon">📸</div>
      <p id="dz-text">Click or drag an image here</p>
      <span class="dz-hint" id="dz-hint">JPG, PNG, GIF, WebP · max 8MB</span>
      <img id="preview-img" alt="preview"/>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="input-user" placeholder="your_name" maxlength="30"/>
    </div>
    <div class="field">
      <label>Caption</label>
      <textarea id="input-caption" placeholder="Add a funny caption... 😂" maxlength="300"></textarea>
    </div>
    <div class="uploading-bar" id="uploading-bar">
      <div class="spinner"></div> Uploading your meme...
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="btn-post" id="post-btn" onclick="postMeme()" disabled>Post Meme 🚀</button>
    </div>
  </div>
</div>

<!-- COMMENTS PANEL -->
<div class="comments-overlay" id="comments-overlay" onclick="handleCommentsOverlayClick(event)">
  <div class="comments-panel">
    <div class="comments-header">
      <h3>💬 Comments <span id="comments-panel-count" style="color:var(--muted);font-weight:400;font-size:.82rem;"></span></h3>
      <button class="comments-close" onclick="closeComments()">✕</button>
    </div>
    <div class="comments-list" id="comments-list"></div>
    <div class="comments-input-area">
      <input class="comment-user-input" id="comment-username" placeholder="name" maxlength="30"/>
      <textarea class="comment-text-input" id="comment-text" placeholder="Write a comment..." maxlength="300" rows="1" onkeydown="handleCommentKey(event)"></textarea>
      <button class="comment-send" id="comment-send-btn" onclick="submitComment()">➤</button>
    </div>
  </div>
</div>

<div class="feed" id="feed">
  <div class="skeleton-card"><div class="skel skel-head"></div><div class="skel skel-img"></div><div class="skel skel-foot"></div></div>
  <div class="skeleton-card"><div class="skel skel-head"></div><div class="skel skel-img"></div><div class="skel skel-foot"></div></div>
  <div class="skeleton-card"><div class="skel skel-head"></div><div class="skel skel-img"></div><div class="skel skel-foot"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://jylvokyuzbgbqvpprzit.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bHZva3l1emJnYnF2cHByeml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTY1NTEsImV4cCI6MjA4ODg5MjU1MX0.NBiEyu4olXHxPBi1rrXmwzXJra7-Nb5fGgElmeeM4Oc';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let selectedFile = null;
  let activeMemeId = null;
  let allMemes = [];

  // ── LOAD FEED ──
  async function loadMemes() {
    const { data, error } = await sb
      .from('memes')
      .select('*, comments(count)')
      .order('created_at', { ascending: false });

    if (error) { showToast('⚠️ Failed to load memes'); return; }
    allMemes = data;
    renderFeed(data);
  }

  function renderFeed(memes) {
    const feed = document.getElementById('feed');
    document.getElementById('meme-count').textContent = memes.length + (memes.length === 1 ? ' meme' : ' memes');

    if (!memes.length) {
      feed.innerHTML = `<div class="empty"><div class="big">😂</div><h3>No memes yet!</h3><p>Be the first to post something hilarious.</p></div>`;
      return;
    }

    feed.innerHTML = memes.map((m, i) => {
      const commentCount = m.comments?.[0]?.count ?? 0;
      return `
      <div class="card" style="animation-delay:${i * 0.06}s" id="card-${m.id}">
        <div class="card-head">
          <div class="avatar">${escHtml(m.username.charAt(0).toUpperCase())}</div>
          <div class="card-info">
            <div class="card-user">${escHtml(m.username)}</div>
            <div class="card-time">${timeAgo(m.created_at)}</div>
          </div>
          <div class="menu-wrap">
            <button class="menu-trigger" onclick="toggleMenu('${m.id}')">⋯</button>
            <div class="dropdown" id="menu-${m.id}">
              <button onclick="deleteMeme('${m.id}', '${m.image_url}')">🗑 Delete</button>
            </div>
          </div>
        </div>
        <img class="card-img" src="${m.image_url}" alt="meme" loading="lazy"/>
        <div class="card-actions">
          <button class="like-btn ${m.user_liked ? 'liked' : ''}" id="like-${m.id}" onclick="toggleLike('${m.id}', ${m.likes})">
            <span class="heart">${m.user_liked ? '❤️' : '🤍'}</span>
            <span class="like-count" id="lc-${m.id}">${m.likes}</span>
          </button>
          <button class="comment-btn" onclick="openComments('${m.id}')">
            <span class="bubble">💬</span>
            <span class="comment-count" id="cc-${m.id}">${commentCount}</span>
          </button>
        </div>
        ${m.caption ? `<div class="card-caption"><strong>${escHtml(m.username)}</strong>${escHtml(m.caption)}</div>` : ''}
        <div class="card-comments-preview" id="preview-${m.id}"></div>
      </div>`;
    }).join('');

    // load 2 preview comments per card
    memes.forEach(m => loadPreviewComments(m.id));
  }

  async function loadPreviewComments(memeId) {
    const { data } = await sb
      .from('comments')
      .select('*')
      .eq('meme_id', memeId)
      .order('created_at', { ascending: false })
      .limit(2);

    const container = document.getElementById('preview-' + memeId);
    if (!container || !data || !data.length) return;

    const total = parseInt(document.getElementById('cc-' + memeId)?.textContent || '0');
    container.innerHTML = data.reverse().map(c => `
      <div class="preview-comment">
        <strong>${escHtml(c.username)}</strong>${escHtml(c.content)}
      </div>
    `).join('') + (total > 2 ? `<button class="view-all-comments" onclick="openComments('${memeId}')">View all ${total} comments</button>` : '');
  }

  // ── COMMENTS PANEL ──
  async function openComments(memeId) {
    activeMemeId = memeId;
    document.getElementById('comments-overlay').classList.add('open');
    document.getElementById('comments-list').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:30px;color:var(--muted);font-size:.88rem;">
        <div class="spinner"></div> Loading comments...
      </div>`;
    await loadComments(memeId);
  }

  function closeComments() {
    document.getElementById('comments-overlay').classList.remove('open');
    activeMemeId = null;
  }

  function handleCommentsOverlayClick(e) {
    if (e.target === document.getElementById('comments-overlay')) closeComments();
  }

  async function loadComments(memeId) {
    const { data, error } = await sb
      .from('comments')
      .select('*')
      .eq('meme_id', memeId)
      .order('created_at', { ascending: true });

    if (error) { showToast('⚠️ Failed to load comments'); return; }

    const list = document.getElementById('comments-list');
    document.getElementById('comments-panel-count').textContent = data.length ? `(${data.length})` : '';

    if (!data.length) {
      list.innerHTML = `<div class="no-comments"><div class="nc-icon">💬</div><p>No comments yet.<br/>Be the first to say something!</p></div>`;
      return;
    }

    list.innerHTML = data.map(c => `
      <div class="comment-item" id="comment-${c.id}">
        <div class="comment-avatar">${escHtml(c.username.charAt(0).toUpperCase())}</div>
        <div class="comment-body">
          <div class="comment-user">${escHtml(c.username)}</div>
          <div class="comment-text">${escHtml(c.content)}</div>
          <div class="comment-time">${timeAgo(c.created_at)}</div>
        </div>
        <button class="comment-delete" onclick="deleteComment('${c.id}', '${memeId}')" title="Delete">✕</button>
      </div>
    `).join('');

    // scroll to bottom
    list.scrollTop = list.scrollHeight;
  }

  async function submitComment() {
    if (!activeMemeId) return;
    const username = (document.getElementById('comment-username').value.trim() || 'Anonymous');
    const content  = document.getElementById('comment-text').value.trim();
    if (!content) return;

    const btn = document.getElementById('comment-send-btn');
    btn.disabled = true;

    const { error } = await sb.from('comments').insert({ meme_id: activeMemeId, username, content });

    btn.disabled = false;

    if (error) { showToast('⚠️ Failed to post comment'); return; }

    document.getElementById('comment-text').value = '';

    // update comment count on card
    const ccEl = document.getElementById('cc-' + activeMemeId);
    if (ccEl) ccEl.textContent = parseInt(ccEl.textContent || '0') + 1;

    await loadComments(activeMemeId);
    await loadPreviewComments(activeMemeId);
  }

  function handleCommentKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitComment(); }
  }

  async function deleteComment(commentId, memeId) {
    await sb.from('comments').delete().eq('id', commentId);

    const ccEl = document.getElementById('cc-' + memeId);
    if (ccEl) ccEl.textContent = Math.max(0, parseInt(ccEl.textContent || '1') - 1);

    const el = document.getElementById('comment-' + commentId);
    if (el) { el.style.opacity = '0'; el.style.transform = 'scale(.9)'; el.style.transition = '.2s'; }
    setTimeout(() => loadComments(memeId), 220);
    loadPreviewComments(memeId);
  }

  // ── POST MEME ──
  async function postMeme() {
    if (!selectedFile) return;
    const username = (document.getElementById('input-user').value.trim() || 'Anonymous');
    const caption  = document.getElementById('input-caption').value.trim();
    setUploading(true);

    const ext  = selectedFile.name.split('.').pop();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

    const { error: uploadError } = await sb.storage.from('memes').upload(path, selectedFile, { contentType: selectedFile.type });
    if (uploadError) { setUploading(false); showToast('⚠️ Upload failed: ' + uploadError.message); return; }

    const { data: urlData } = sb.storage.from('memes').getPublicUrl(path);
    const { error: dbError } = await sb.from('memes').insert({ username, caption, image_url: urlData.publicUrl, likes: 0 });

    if (dbError) { setUploading(false); showToast('⚠️ Failed to save meme'); return; }

    setUploading(false);
    closeModal();
    showToast('🔥 Meme posted!');
    loadMemes();
  }

  // ── LIKE ──
  async function toggleLike(id, currentLikes) {
    const btn = document.getElementById('like-' + id);
    const isLiked = btn.classList.contains('liked');
    const newLikes = isLiked ? currentLikes - 1 : currentLikes + 1;
    btn.querySelector('.heart').textContent = isLiked ? '🤍' : '❤️';
    document.getElementById('lc-' + id).textContent = newLikes;
    isLiked ? btn.classList.remove('liked') : btn.classList.add('liked');
    await sb.from('memes').update({ likes: newLikes }).eq('id', id);
  }

  // ── DELETE MEME ──
  async function deleteMeme(id, imageUrl) {
    await sb.from('memes').delete().eq('id', id);
    const path = imageUrl.split('/memes/')[1];
    if (path) await sb.storage.from('memes').remove([path]);
    const card = document.getElementById('card-' + id);
    if (card) { card.style.opacity='0'; card.style.transform='scale(.9)'; card.style.transition='.25s'; }
    setTimeout(loadMemes, 260);
    showToast('Meme deleted');
  }

  // ── UPLOAD MODAL HELPERS ──
  function setUploading(on) {
    document.getElementById('uploading-bar').classList.toggle('show', on);
    document.getElementById('post-btn').disabled = on;
    document.getElementById('cancel-btn').disabled = on;
  }

  function handleFile(file) {
    if (!file) return;
    if (file.size > 8 * 1024 * 1024) { showToast('⚠️ Image too large (max 8MB)'); return; }
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview-img');
      img.src = e.target.result; img.style.display = 'block';
      document.getElementById('dz-icon').style.display = 'none';
      document.getElementById('dz-text').style.display = 'none';
      document.getElementById('dz-hint').style.display = 'none';
      document.getElementById('post-btn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function openModal() { document.getElementById('upload-overlay').classList.add('open'); resetModal(); }
  function closeModal() { document.getElementById('upload-overlay').classList.remove('open'); }
  function handleUploadOverlayClick(e) { if (e.target === document.getElementById('upload-overlay')) closeModal(); }

  function resetModal() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('input-user').value = '';
    document.getElementById('input-caption').value = '';
    document.getElementById('preview-img').style.display = 'none';
    document.getElementById('dz-icon').style.display = '';
    document.getElementById('dz-text').style.display = '';
    document.getElementById('dz-hint').style.display = '';
    document.getElementById('post-btn').disabled = true;
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  function toggleMenu(id) {
    const menu = document.getElementById('menu-' + id);
    const wasOpen = menu.classList.contains('open');
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    if (!wasOpen) menu.classList.add('open');
  }
  document.addEventListener('click', e => {
    if (!e.target.closest('.menu-wrap')) document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
  });

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  loadMemes();
</script>
</body>
</html>
